name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # 1. Enforce the exact modern Node.js engine version Astro requires
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'

      # 2. Clean install your exact package-lock dependencies
      - name: Install dependencies
        run: npm ci

      # 3. Compile the Astro project into static HTML/CSS/JS assets
      - name: Build Astro project
        run: npm run build

      # 4. Grab the generated files out of the dist/ directory for deployment
      - name: Upload production assets artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4